<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AJCE FDP AR Demo</title>

  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      color: #222;
      text-align: center;
    }

    header {
      background-color: #0d47a1;
      color: white;
      padding: 20px;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
    }

    p {
      margin-top: 8px;
      font-size: 1rem;
    }

    .viewer-container {
      width: 100%;
      height: 80vh;
      background-color: white;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background-color: #eaeaea;
    }

    .instructions {
      padding: 20px;
      font-size: 1rem;
      line-height: 1.6;
    }

    .highlight {
      color: #0d47a1;
      font-weight: bold;
    }

    footer {
      padding: 15px;
      background-color: #0d47a1;
      color: white;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <header>
    <h1>AJCE FDP AR Demo</h1>
    <p>Augmented Reality in Civil Engineering</p>
  </header>

  <div class="viewer-container">

    <model-viewer
      src="house.glb"
      alt="3D AR House Model"

      ar
      ar-modes="webxr scene-viewer quick-look"

      camera-controls
      auto-rotate

      shadow-intensity="1"

      exposure="1"

      environment-image="neutral">

    </model-viewer>

  </div>

  <div class="instructions">

    <p>
      Rotate and zoom the model using your fingers.
    </p>

    <p>
      Tap the <span class="highlight">AR button</span> to place the building on your table or floor.
    </p>

    <p>
      Join the WhatsApp interaction session and suggest colors for the building model.
    </p>

  </div>

  <footer>
    BIM → GLB → WebXR → Mobile AR
  </footer>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Applications of AR in Civil Engineering</title>

    <script type="module"
        src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js">
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            background-color: #f5f5f5;
        }

        h1 {
            margin-top: 20px;
        }

        p {
            max-width: 800px;
            margin: auto;
            padding: 10px;
        }

        model-viewer {
            width: 100%;
            height: 75vh;
            background-color: white;
        }

        .instructions {
            margin: 20px;
            font-size: 1rem;
        }

        footer {
            margin: 20px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <h1>Applications of Augmented Reality in Civil Engineering</h1>

    <p>
        FDP Demonstration by Vinay Mathews
    </p>

    <model-viewer
        src="pacific2.glb"
        alt="Civil Engineering BIM Model"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        auto-rotate
        shadow-intensity="1"
        exposure="1"
        loading="eager">
    </model-viewer>

    <div class="instructions">
        <p>
            📱 Mobile Users:
            Click the AR button to place the BIM model on your table or floor.
        </p>

        <p>
            🖱 Desktop Users:
            Drag to rotate and use the mouse wheel to zoom.
        </p>
    </div>

    <footer>
        BIM → GLB → WebXR → Mobile AR
    </footer>

</body>

</html>
